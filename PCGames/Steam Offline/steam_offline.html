<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    
    <!-- تحسين العناوين والـ Meta Tags -->
    <title>Steam Offline | Archer Store - أرشر ستور</title>
    <meta name="description" content="تسوق أفضل ألعاب Steam Offline الرقمية بأسعار مميزة من متجر Archer Store. أمان وسرعة في التسليم.">
    <meta name="keywords" content="ألعاب، ستيم، Steam Offline، أرشر ستور، العاب رقمية، ليبيا">
    
    <!-- الوسوم الخاصة بمواقع التواصل الاجتماعي (Open Graph) -->
    <meta property="og:title" content="Steam Offline | Archer Store">
    <meta property="og:description" content="مجموعة مختارة من أفضل الألعاب الرقمية بأسعار تنافسية.">
    <meta property="og:image" content="../../a.png">
    <meta property="og:type" content="website">
    
    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Steam Offline | Archer Store">
    <meta name="twitter:description" content="أفضل الألعاب الرقمية بأسعار تنافسية.">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { 
            --primary: #00d2ff; 
            --accent: #00ff99; 
            --bg: #070912;
            --card-bg: rgba(13, 17, 23, 0.96); /* تعديل الخلفية لتكون معتمة بدلاً من الـ Blur لحل مشكلة التقطيع نهائياً */
            --border: rgba(255, 255, 255, 0.1);
            --transition: cubic-bezier(0.25, 1, 0.5, 1);
        }

        * { box-sizing: border-box; }

        body { 
            background: #070912;
            color: white; 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0; padding: 0; 
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* عزل الخلفية الثابتة في عنصر مستقل ومحسن لضمان تجربة تصفح فائقة السلاسة */
        #dynamicBg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('../../a.png') no-repeat center center;
            background-size: cover;
            z-index: -2;
        }

        /* غطاء حماية احترافي لزيادة تباين النصوص */
        .bg-overlay { 
            position: fixed; inset: 0;
            background: radial-gradient(circle at top right, rgba(0, 210, 255, 0.05), transparent),
                        radial-gradient(circle at bottom left, rgba(0, 255, 153, 0.05), transparent),
                        rgba(7, 9, 18, 0.88); 
            z-index: -1; 
        }

        .header {
            text-align: center; 
            padding: 80px 20px 40px;
            animation: fadeInDown 0.8s var(--transition);
        }

        h1 { 
            font-size: clamp(32px, 10vw, 54px); 
            font-weight: 900;
            color: white; 
            margin: 0; 
            letter-spacing: 2px;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 210, 255, 0.3));
        }

        .subtitle { 
            color: #94a3b8; 
            font-size: clamp(14px, 4vw, 18px); 
            margin-top: 15px; 
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* شبكة المنتجات */
        .products-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 25px; 
            max-width: 1300px; 
            margin: 0 auto; 
            padding: 20px 20px 150px;
        }

        /* تصميم الكرت السلس */
        .card { 
            background: var(--card-bg); 
            border-radius: 28px; 
            border: 1px solid var(--border); 
            overflow: hidden; 
            text-decoration: none; 
            color: white; 
            transition: transform 0.4s var(--transition), border-color 0.4s var(--transition), box-shadow 0.4s var(--transition);
            opacity: 0; 
            transform: translateY(25px);
            display: flex; 
            flex-direction: column;
            position: relative;
            will-change: transform, opacity;
        }

        .card.show { opacity: 1; transform: translateY(0); }

        .card:hover { 
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0, 210, 255, 0.15);
        }

        .card-img-wrapper { 
            width: 100%; 
            aspect-ratio: 10/12; 
            overflow: hidden; 
            background: #000;
            position: relative;
        }

        .card img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            transition: transform 0.6s var(--transition); 
        }

        .card:hover img { transform: scale(1.06); }

        /* إضافة لمعان خفيف عند التمرير */
        .card::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }
        .card:hover::after { left: 100%; }

        .info { padding: 20px; text-align: center; }
        .name { 
            font-size: 17px; 
            font-weight: 700; 
            color: #f1f5f9; 
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 44px;
        }

        .price { 
            color: var(--accent); 
            font-weight: 800; 
            font-size: 1.3rem; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        /* شريط التنقل السفلي */
        .floating-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 420px; 
            display: flex; justify-content: space-around; align-items: center;
            background: rgba(13, 17, 23, 0.95); 
            padding: 14px; border-radius: 100px; 
            border: 1px solid var(--border);
            z-index: 1000; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }
        
        .nav-item {
            width: 55px; height: 55px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            transition: transform 0.3s var(--transition);
            text-decoration: none;
        }

        .nav-item:hover { transform: translateY(-5px); }
        .nav-item img { width: 26px; height: 26px; }

        .wa-link { background: #25D366; box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2); }
        .home-link { background: white; box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1); }
        .fb-link { background: #1877F2; box-shadow: 0 10px 20px rgba(24, 119, 242, 0.2); }

        .home-link img { filter: invert(0); }

        /* الأنميشن */
        @keyframes fadeInDown { 
            from { opacity: 0; transform: translateY(-20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* تحسينات الموبايل */
        @media (max-width: 600px) {
            .products-grid { 
                grid-template-columns: repeat(2, 1fr); 
                gap: 15px; 
                padding: 10px 15px 120px; 
            }
            .header { padding: 60px 15px 20px; }
            .name { font-size: 14px; min-height: 36px; }
            .price { font-size: 1.1rem; }
            .card { border-radius: 20px; }
            .floating-nav { bottom: 20px; padding: 10px; width: 90%; }
            .nav-item { width: 50px; height: 50px; }
        }

        /* إخفاء السكرول بار وتجميله */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
    </style>
</head>
<body>

    <div id="dynamicBg"></div>
    <div class="bg-overlay"></div>

    <header class="header">
        <h1>STEAM OFFLINE</h1>
        <div class="subtitle">تجربة ألعاب فريدة بأسعار خارج المنافسة مع دعم فني مستمر</div>
    </header>

    <div class="products-grid" id="list">
        <!-- Loader بسيط -->
        <div style="grid-column: 1/-1; text-align: center; padding: 50px; opacity: 0.5;">
            جاري استدعاء قائمة الألعاب...
        </div>
    </div>

    <div class="floating-nav">
        <a href="https://wa.me/218919718809" target="_blank" class="nav-item wa-link" title="واتساب">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
        </a>

        <a href="../../index.html" class="nav-item home-link" title="الرئيسية">
            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946436.png" alt="Home">
        </a>

        <a href="https://www.facebook.com/share/1B6gGToRF8/" target="_blank" class="nav-item fb-link" title="فيسبوك">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook">
        </a>
    </div>

<script>
    const _URL = "https://bmcnlmxkfsrpcmjhbixg.supabase.co";
    const _KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJtY25sbXhrZnNycGNtamhiaXhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NDA1MDcsImV4cCI6MjA5MzMxNjUwN30.CO07kz6XQ2_MLZ1Y0feVttiKkwWqref_k4IfmY11KAw";
    const sb = supabase.createClient(_URL, _KEY);

    async function loadProducts() {
        try {
            const { data: prods, error } = await sb.from('products')
                .select('*')
                .eq('category', 'steam_offline')
                .order('created_at', { ascending: false });
            
            const listDiv = document.getElementById('list');
            
            if (prods && prods.length > 0) {
                listDiv.innerHTML = prods.map((p, index) => `
                    <a href="product-details.html?id=${p.id}" class="card" style="transition-delay: ${index * 0.05}s">
                        <div class="card-img-wrapper">
                            <img src="${p.image_url}" loading="lazy" alt="${p.name}">
                        </div>
                        <div class="info">
                            <div class="name">${p.name}</div>
                            <div class="price">${p.price} <span style="font-size: 12px; font-weight: 400; color: #94a3b8;">د.ل</span></div>
                        </div>
                    </a>
                `).join('');

                // تشغيل الأنميشن بعد التحميل
                setTimeout(() => {
                    document.querySelectorAll('.card').forEach(c => c.classList.add('show'));
                }, 50);
            } else {
                listDiv.innerHTML = "<p style='text-align:center; grid-column:1/-1; opacity:0.6; padding-top: 50px;'>نعتذر، لا توجد ألعاب متوفرة في هذا القسم حالياً.</p>";
            }
        } catch (err) {
            console.error(err);
            document.getElementById('list').innerHTML = "<p style='text-align:center; grid-column:1/-1; color:red;'>حدث خطأ أثناء تحميل البيانات. يرجى المحاولة لاحقاً.</p>";
        }
    }

    window.onload = loadProducts;
</script>
</body>
</html>
