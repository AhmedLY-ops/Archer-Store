<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>تفاصيل المنتج | Archer Store</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary: #00d2ff; 
            --accent: #00ff99; 
            --bg: #070912;
            --card-bg: rgba(13, 17, 23, 0.96); /* جعل الخلفية معتمة بدلاً من تأثير Blur الثقيل */
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --shadow: 0 20px 50px rgba(0,0,0,0.5);
            --transition: cubic-bezier(0.25, 1, 0.5, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: #f8fafc;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* عزل الصورة الخلفية لمنع إعادة حساب التصفية الرسومية أثناء التمرير */
        #dynamicBg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('../../a.png') no-repeat center center;
            background-size: cover;
            z-index: -2;
        }

        /* غطاء تدرج لزيادة وضوح وقراءة النصوص والأزرار */
        .bg-overlay {
            position: fixed; inset: 0;
            background: radial-gradient(circle at top, rgba(7, 9, 18, 0.7), rgba(7, 9, 18, 0.95)); 
            z-index: -1;
        }

        .container {
            max-width: 1100px; margin: 0 auto; padding: 40px 20px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 40px;
            padding-bottom: 140px;
            animation: fadeIn 0.8s var(--transition);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- قسم معرض الصور --- */
        .gallery-wrapper { position: sticky; top: 30px; will-change: transform; }
        
        .main-display {
            background: #000;
            border-radius: 30px; border: 1px solid var(--border);
            aspect-ratio: 1/1; 
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; 
            box-shadow: var(--shadow);
            position: relative;
        }

        .main-display img { 
            width: 100%; height: 100%; 
            object-fit: contain;
            transition: transform 0.6s var(--transition), opacity 0.3s ease;
        }

        .main-display:hover img {
            transform: scale(1.05);
        }

        .thumbnails {
            display: flex; gap: 12px; margin-top: 20px; 
            overflow-x: auto; padding: 10px 2px;
            scrollbar-width: none;
        }
        
        .thumbnails::-webkit-scrollbar { display: none; }

        .thumbnails img {
            width: 75px; height: 75px; border-radius: 16px;
            object-fit: cover; border: 2px solid transparent;
            opacity: 0.4; transition: 0.3s var(--transition); flex-shrink: 0; cursor: pointer;
            background: var(--glass);
        }

        .thumbnails img.active { 
            border-color: var(--primary); 
            opacity: 1; 
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0,210,255,0.2);
        }

        /* --- قسم تفاصيل المنتج --- */
        .product-info {
            background: var(--card-bg); padding: 40px; border-radius: 40px;
            border: 1px solid var(--border);
            display: flex; flex-direction: column;
            box-shadow: var(--shadow);
        }

        .tag {
            background: linear-gradient(90deg, rgba(0, 210, 255, 0.15), transparent);
            color: var(--primary); padding: 6px 16px; border-radius: 50px;
            font-size: 12px; font-weight: 800; display: inline-block;
            margin-bottom: 20px; border-right: 3px solid var(--primary);
            width: fit-content;
        }

        h1 { font-size: clamp(24px, 4vw, 36px); margin: 0; line-height: 1.2; font-weight: 900; }
        
        .price { 
            font-size: 42px; color: var(--accent); font-weight: 900; 
            margin: 25px 0; display: flex; align-items: baseline; gap: 10px;
        }
        .price span { font-size: 16px; color: #94a3b8; font-weight: 400; }
        
        .desc-container {
            background: rgba(255,255,255,0.01); padding: 25px; border-radius: 25px;
            color: #cbd5e1; font-size: 16px; line-height: 1.8; margin-bottom: 35px;
            border: 1px solid var(--border); white-space: pre-line;
        }

        /* --- الأزرار --- */
        .btn-group { display: flex; gap: 15px; }
        
        .btn {
            flex: 1; padding: 20px; border-radius: 24px; border: none;
            font-weight: 800; font-size: 18px; cursor: pointer; transition: 0.3s var(--transition);
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        
        .btn-cart { 
            background: var(--glass); color: #fff; 
            border: 1px solid var(--border);
        }
        .btn-cart:hover { background: rgba(255,255,255,0.1); border-color: #fff; }

        .btn-buy { 
            background: linear-gradient(135deg, #00d2ff, #0082ff); 
            color: #070912; 
            box-shadow: 0 15px 35px rgba(0,210,255,0.2); 
        }
        .btn-buy:hover { transform: translateY(-4px); box-shadow: 0 20px 45px rgba(0,210,255,0.4); }
        
        .btn:active { transform: scale(0.97); }

        /* --- شريط التنقل السفلي --- */
        .floating-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 420px; display: flex; justify-content: space-around; align-items: center;
            background: rgba(13, 17, 23, 0.95);
            padding: 12px; border-radius: 100px; border: 1px solid var(--border);
            z-index: 1000; box-shadow: 0 25px 50px rgba(0,0,0,0.7);
        }
        
        .nav-item {
            width: 52px; height: 52px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; transition: transform 0.3s var(--transition);
        }
        .nav-item:hover { transform: translateY(-5px); }
        
        .nav-item img { width: 24px; height: 24px; }
        .wa-link { background: #25D366; box-shadow: 0 10px 20px rgba(37,211,102,0.2); }
        .cart-link { background: var(--primary); box-shadow: 0 10px 20px rgba(0,210,255,0.2); }
        .home-link { background: white; box-shadow: 0 10px 20px rgba(255,255,255,0.1); }

        /* --- توافق الشاشات (Responsive) --- */
        @media (max-width: 950px) {
            .container { grid-template-columns: 1fr; gap: 25px; padding-top: 20px; }
            .gallery-wrapper { position: relative; top: 0; }
            .product-info { padding: 30px 25px; border-radius: 35px; }
            .price { font-size: 34px; margin: 20px 0; }
            .btn-group { flex-direction: column; }
            .btn { width: 100%; padding: 18px; }
        }

        @media (max-width: 480px) {
            .container { padding: 15px; }
            .main-display { border-radius: 24px; }
            .floating-nav { width: 90%; bottom: 20px; padding: 10px; }
            .nav-item { width: 48px; height: 48px; }
            h1 { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div id="dynamicBg"></div>
    <div class="bg-overlay"></div>

    <div class="container" id="productRoot">
        <div style="grid-column: 1/-1; text-align: center; padding: 120px 20px;">
            <div style="font-size: 20px; color: var(--primary); font-weight: bold;">جاري استحضار عتاد المنتج...</div>
        </div>
    </div>

    <!-- شريط التنقل السفلي العائم -->
    <div class="floating-nav">
        <a href="../../index.html" class="nav-item home-link" title="الرئيسية">
            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946436.png" style="filter: invert(0);">
        </a>
        <a href="https://wa.me/218919718809" target="_blank" class="nav-item wa-link" title="واتساب">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
        </a>
        <a href="../../orders.html" class="nav-item cart-link" title="طلباتي">
            <img src="https://cdn-icons-png.flaticon.com/512/1170/1170678.png" style="filter: brightness(0);">
        </a>
    </div>

    <script>
        const _URL = "https://bmcnlmxkfsrpcmjhbixg.supabase.co";
        const _KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJtY25sbXhrZnNycGNtamhiaXhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NDA1MDcsImV4cCI6MjA5MzMxNjUwN30.CO07kz6XQ2_MLZ1Y0feVttiKkwWqref_k4IfmY11KAw";
        const sb = supabase.createClient(_URL, _KEY);
        const pId = new URLSearchParams(window.location.search).get('id');
        let productData = null;

        async function init() {
            if (!pId) return;
            try {
                const { data: p, error } = await sb.from('products').select('*').eq('id', pId).single();
                if (error) throw error;
                
                if (p) {
                    productData = p;
                    document.getElementById('productRoot').innerHTML = `
                        <div class="gallery-wrapper">
                            <div class="main-display">
                                <img src="${p.image_url}" id="viewImg" alt="${p.name}">
                            </div>
                            <div class="thumbnails">
                                <img src="${p.image_url}" onclick="updateView(this)" class="active">
                                ${p.img2 ? `<img src="${p.img2}" onclick="updateView(this)">` : ''}
                                ${p.img3 ? `<img src="${p.img3}" onclick="updateView(this)">` : ''}
                            </div>
                        </div>
                        <div class="product-info">
                            <span class="tag">Archer Premium Equipment</span>
                            <h1>${p.name}</h1>
                            <div class="price">${p.price} <span>د.ل</span></div>
                            <div class="desc-container">${p.description || 'لا يوجد وصف متاح لهذا المنتج حالياً.'}</div>
                            <div class="btn-group">
                                <button class="btn btn-cart" onclick="saveToCart()">إضافة للسلة 🛒</button>
                                <button class="btn btn-buy" onclick="quickBuy()">شراء الآن 🔥</button>
                            </div>
                        </div>
                    `;
                }
            } catch (err) {
                console.error(err);
                document.getElementById('productRoot').innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 100px; color: #ff4d4d; font-weight: bold;">
                        عذراً، فشل تحميل تفاصيل المنتج. يرجى التحقق من الاتصال.
                    </div>
                `;
            }
        }

        function saveToCart() {
            if (!productData) return;
            let cart = JSON.parse(localStorage.getItem('archer_cart')) || [];
            if (!cart.find(x => x.id === productData.id)) {
                cart.push({ id: pId, name: productData.name, price: productData.price, image: productData.image_url });
                localStorage.setItem('archer_cart', JSON.stringify(cart));
                alert("تمت الإضافة بنجاح!");
            } else {
                alert("المنتج موجود بالفعل في السلة");
            }
        }

        function quickBuy() {
            saveToCart();
            window.location.href = "../../orders.html";
        }

        function updateView(el) {
            const v = document.getElementById('viewImg');
            if (!v || v.src === el.src) return;
            
            v.style.opacity = '0';
            v.style.transform = 'scale(0.98)';
            
            setTimeout(() => { 
                v.src = el.src; 
                v.style.opacity = '1'; 
                v.style.transform = 'scale(1)';
            }, 150);
            
            document.querySelectorAll('.thumbnails img').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        init();
    </script>
</body>
</html>
