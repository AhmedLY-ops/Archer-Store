<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    
    <!-- Meta Tags الأساسية للـ SEO -->
    <title>Steam Accounts | Archer Store - أرشر ستور</title>

    <meta name="keywords" content="حسابات ستيم، Steam Online, Full Access, أرشر ستور، العاب كمبيوتر، ألعاب رقمية، ليبيا">
    <meta name="author" content="Archer Store">

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://archerstore.netlify.app">
    <meta property="og:title" content="Steam Accounts | Archer Store - ملكية كاملة">
    <meta property="og:description" content="امتلك حسابك الخاص الآن مع إمكانية تغيير كافة البيانات. تسليم فوري وضمان متميز.">
    <meta property="og:image" content="https://archerstore.netlify.app/a.png">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Steam Accounts | Archer Store">
    <meta name="twitter:description" content="حسابات ستيم أصلية بملكية كاملة في ليبيا.">
    <meta name="twitter:image" content="https://archerstore.netlify.app/a.png">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { 
            --primary: #00d2ff; 
            --accent: #00ff99; 
            --bg: #070912;
            --card-bg: rgba(13, 17, 23, 0.96); /* تعديل الخلفية لتكون معتمة بدلاً من الـ Blur لحل مشكلة التقطيع أثناء التمرير */
            --border: rgba(255, 255, 255, 0.1);
            --glow: rgba(0, 210, 255, 0.4);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body { 
            background: var(--bg);
            color: white; 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0; padding: 0; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* عزل الخلفية الثابتة في عنصر مستقل ومحسن لضمان معالجة رسومية فائقة السرعة وسلاسة كاملة */
        #dynamicBg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('../../a.png') no-repeat center center;
            background-size: cover;
            z-index: -2;
        }

        /* طبقة حماية لزيادة تباين النص */
        .bg-overlay { 
            position: fixed; inset: 0;
            background: radial-gradient(circle at top, rgba(0, 210, 255, 0.05), transparent),
                        linear-gradient(180deg, rgba(7, 9, 18, 0.8) 0%, #070912 100%); 
            z-index: -1; 
        }

        .header {
            text-align: center; 
            padding: clamp(60px, 12vh, 100px) 20px 40px;
            animation: slideInDown 0.8s var(--transition);
        }

        h1 { 
            font-size: clamp(32px, 8vw, 56px); 
            font-weight: 900;
            background: linear-gradient(to bottom, #fff 30%, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            letter-spacing: -1px;
            filter: drop-shadow(0 0 20px rgba(0, 210, 255, 0.3));
        }

        .subtitle { 
            color: #94a3b8; 
            font-size: clamp(14px, 4vw, 18px); 
            margin-top: 15px; 
            font-weight: 500;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        /* شبكة المنتجات الاحترافية */
        .products-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 30px; 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 20px 30px 160px;
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 32px; 
            border: 1px solid var(--border); 
            overflow: hidden; 
            text-decoration: none; 
            color: white; 
            transition: var(--transition);
            opacity: 0; 
            transform: translateY(25px);
            display: flex; 
            flex-direction: column;
            position: relative;
            will-change: transform, opacity;
        }

        .card.show { opacity: 1; transform: translateY(0); }

        .card:hover { 
            transform: translateY(-8px);
            border-color: var(--primary);
            background: rgba(13, 17, 23, 0.98);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(0, 210, 255, 0.15);
        }

        .card-img-wrapper { 
            width: 100%; aspect-ratio: 1/1; 
            overflow: hidden; 
            position: relative;
        }

        .card img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            transition: transform 0.6s var(--transition); 
        }

        .card:hover img { transform: scale(1.06); }

        /* شارة الحالة */
        .card::before {
            content: "متوفر الآن";
            position: absolute; top: 15px; right: 15px;
            background: var(--accent); color: #000;
            font-size: 10px; font-weight: 900; padding: 4px 10px;
            border-radius: 50px; z-index: 2;
        }

        .info { padding: 25px; text-align: center; }
        .name { 
            font-size: 18px; font-weight: 700; 
            color: #fff; margin-bottom: 12px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; min-height: 50px;
        }

        .price { 
            color: var(--accent); font-weight: 800; font-size: 1.5rem;
            text-shadow: 0 0 10px rgba(0, 255, 153, 0.3);
        }

        /* شريط التنقل السفلي Floating Glass */
        .floating-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 420px; 
            display: flex; justify-content: space-around; align-items: center;
            background: rgba(13, 17, 23, 0.95);
            padding: 12px; border-radius: 100px; border: 1px solid var(--border);
            z-index: 1000; box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }
        
        .nav-item {
            width: 55px; height: 55px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .nav-item img { width: 28px; height: 28px; }
        .nav-item:hover { transform: translateY(-5px) scale(1.05); }

        .wa-link { background: linear-gradient(135deg, #25D366, #128C7E); }
        .home-link { background: white; }
        .fb-link { background: linear-gradient(135deg, #1877F2, #0052cc); }

        .home-link img { filter: brightness(0); }

        /* الأنميشن */
        @keyframes slideInDown { 
            from { opacity: 0; transform: translateY(-30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* تحسينات الموبايل */
        @media (max-width: 600px) {
            .products-grid { 
                grid-template-columns: repeat(2, 1fr); 
                gap: 15px; 
                padding: 10px 15px 140px; 
            }
            .header { padding-top: 50px; }
            .name { font-size: 14px; min-height: 40px; }
            .price { font-size: 1.2rem; }
            .card { border-radius: 24px; }
            .floating-nav { bottom: 20px; width: 90%; }
        }

        .loader {
            grid-column: 1/-1; text-align: center; padding: 100px;
            color: var(--primary); font-size: 1.2rem; font-weight: 500;
            letter-spacing: 2px; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="dynamicBg"></div>
    <div class="bg-overlay"></div>

    <header class="header">
        <h1>STEAM ACCOUNTS</h1>
        <div class="subtitle">حسابات ملكية تامة (Full Access) مع ضمان حقيقي</div>
    </header>

    <div class="products-grid" id="list">
        <div class="loader">جاري مزامنة العروض...</div>
    </div>

    <nav class="floating-nav">
        <a href="https://wa.me/218919718809" target="_blank" class="nav-item wa-link" title="واتساب">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
        </a>

        <a href="../../index.html" class="nav-item home-link" title="الرئيسية">
            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946436.png" alt="Home">
        </a>

        <a href="https://www.facebook.com/archer.store.libya" target="_blank" class="nav-item fb-link" title="فيسبوك">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook">
        </a>
    </nav>

<script>
    const _URL = "https://bmcnlmxkfsrpcmjhbixg.supabase.co";
    const _KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJtY25sbXhrZnNycGNtamhiaXhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NDA1MDcsImV4cCI6MjA5MzMxNjUwN30.CO07kz6XQ2_MLZ1Y0feVttiKkwWqref_k4IfmY11KAw";
    const sb = supabase.createClient(_URL, _KEY);

    async function load() {
        try {
            const { data: prods, error } = await sb.from('products').select('*').eq('category', 'steam_online');
            
            const listDiv = document.getElementById('list');
            if (error) throw error;

            if (prods && prods.length > 0) {
                listDiv.innerHTML = prods.map((p, index) => `
                    <a href="product-details.html?id=${p.id}" class="card" style="transition-delay: ${index * 0.05}s">
                        <div class="card-img-wrapper">
                            <img src="${p.image_url}" alt="${p.name}" loading="lazy">
                        </div>
                        <div class="info">
                            <div class="name">${p.name}</div>
                            <div class="price">${p.price} <span style="font-size: 0.8rem; font-weight: 500;">د.ل</span></div>
                        </div>
                    </a>
                `).join('');

                setTimeout(() => {
                    document.querySelectorAll('.card').forEach(c => c.classList.add('show'));
                }, 50);
            } else {
                listDiv.innerHTML = '<div class="loader">نعتذر، لا توجد عروض حالياً.</div>';
            }
        } catch (err) {
            console.error(err);
            document.getElementById('list').innerHTML = '<div class="loader" style="color: #ff4d4d;">عذراً، تعذر جلب البيانات.</div>';
        }
    }
    window.onload = load;
</script>
</body>
</html>
