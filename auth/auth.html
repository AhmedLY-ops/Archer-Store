<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Archer Store - الدخول</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <style>
    :root {
      --primary: #0096ff;
      --primary-hover: #007acc;
      --bg-dark: #0b0d17;
      --input-bg: rgba(255, 255, 255, 0.05);
      --card-bg: rgba(15, 20, 35, 0.96); /* تعديل الخلفية لتكون معتمة بدلاً من الـ Blur لحل مشكلة التقطيع نهائياً */
      --border-color: rgba(255, 255, 255, 0.1);
    }

    * { box-sizing: border-box; }

    body { 
      background: var(--bg-dark);
      color: white; 
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      margin: 0;
      padding: 20px;
    }

    /* فصل الخلفية الثابتة في عنصر مستقل ومحسن لتسريع الرندرة على المتصفحات */
    #dynamicBg {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: url('../a.png') no-repeat center center;
      background-size: cover;
      z-index: -2;
    }

    /* طبقة تظليل فوق الخلفية لضمان وضوح النصوص */
    .bg-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.65);
      z-index: -1;
    }

    .auth-card { 
      background: var(--card-bg);
      padding: 40px 30px; 
      border-radius: 28px; 
      border: 1px solid var(--border-color); 
      width: 100%; 
      max-width: 420px; 
      text-align: center; 
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      animation: fadeIn 0.4s ease-out forwards;
      will-change: transform, opacity;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .store-brand {
      margin-bottom: 25px;
    }

    .store-brand h1 {
      font-size: 32px;
      margin: 0 0 10px 0;
      font-weight: 800;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #fff 30%, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .store-description {
      font-size: 13.5px;
      color: #94a3b8;
      line-height: 1.6;
      margin: 0;
      padding: 0 10px;
    }

    hr {
      border: 0;
      height: 1px;
      background: linear-gradient(to left, transparent, var(--border-color), transparent);
      margin: 20px 0;
    }

    h2 {
      font-size: 22px;
      margin: 0 0 20px 0;
      font-weight: 700;
      color: #f1f5f9;
    }

    input { 
      width: 100%; 
      padding: 15px; 
      margin: 10px 0; 
      border-radius: 12px; 
      border: 1px solid var(--border-color); 
      background: var(--input-bg); 
      color: white; 
      outline: none; 
      font-size: 15px;
      transition: border-color 0.2s, background-color 0.2s, box-shadow 0.2s;
    }

    input:focus { 
      border-color: var(--primary); 
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 14px rgba(0, 150, 255, 0.15);
    }

    button { 
      width: 100%; 
      padding: 16px; 
      border-radius: 12px; 
      border: none; 
      background: var(--primary); 
      color: white; 
      font-weight: bold; 
      cursor: pointer; 
      margin-top: 15px; 
      font-size: 16px; 
      transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s; 
      box-shadow: 0 4px 15px rgba(0, 150, 255, 0.3);
    }

    button:hover { 
      background: var(--primary-hover); 
      transform: translateY(-1px); 
      box-shadow: 0 6px 20px rgba(0, 150, 255, 0.4);
    }

    button:disabled {
      background: #444;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .toggle-link { 
      font-size: 13.5px; 
      color: #94a3b8; 
      cursor: pointer; 
      margin-top: 25px; 
      display: inline-block; 
      transition: color 0.2s;
    }

    .toggle-link:hover { 
      color: var(--primary);
    }

    @media (max-width: 440px) {
      .auth-card {
        padding: 30px 20px;
      }
      .store-brand h1 { font-size: 28px; }
      h2 { font-size: 20px; }
    }
  </style>
</head>
<body>

  <div id="dynamicBg"></div>
  <div class="bg-overlay"></div>

  <div class="auth-card">
    <!-- النبذة التعريفية للمتجر -->
    <div class="store-brand">
      <h1>Archer Store</h1>
      <p class="store-description">بوابتك المتكاملة للحصول على أفضل الخدمات الرقمية، بطاقات الشحن، والألعاب بأسرع تنفيذ وأعلى أمان.</p>
    </div>

    <hr>

    <h2 id="form-title">تسجيل الدخول</h2>
    
    <div id="signup-fields" style="display: none;">
      <input type="text" id="full-name" placeholder="الاسم الكامل">
    </div>
    
    <input type="email" id="email" placeholder="البريد الإلكتروني">
    <input type="password" id="password" placeholder="كلمة المرور">
    
    <button id="auth-btn" onclick="handleAuth()">دخول</button>
    <span class="toggle-link" onclick="toggleAuth()" id="toggle-text">ليس لديك حساب؟ إنشاء حساب جديد</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const sb = supabase.createClient("https://bmcnlmxkfsrpcmjhbixg.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJtY25sbXhrZnNycGNtamhiaXhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NDA1MDcsImV4cCI6MjA5MzMxNjUwN30.CO07kz6XQ2_MLZ1Y0feVttiKkwWqref_k4IfmY11KAw");
    
    let isLogin = true;

    function toggleAuth() {
      isLogin = !isLogin;
      document.getElementById('form-title').innerText = isLogin ? "تسجيل الدخول" : "إنشاء حساب";
      document.getElementById('signup-fields').style.display = isLogin ? "none" : "block";
      document.getElementById('auth-btn').innerText = isLogin ? "دخول" : "تسجيل حساب جديد";
      document.getElementById('toggle-text').innerText = isLogin ? "ليس لديك حساب؟ إنشاء حساب جديد" : "لديك حساب؟ سجل دخولك";
      
      document.querySelector('.auth-card').style.animation = 'none';
      void document.querySelector('.auth-card').offsetWidth; // Trigger reflow
      document.querySelector('.auth-card').style.animation = 'fadeIn 0.3s ease-out';
    }

    async function handleAuth() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('auth-btn');

      if(!email || !password) return alert("الرجاء إدخال البيانات كاملة");
      
      btn.innerText = "جاري المعالجة...";
      btn.disabled = true;

      if (isLogin) {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) {
          alert("خطأ في الدخول: " + error.message);
          btn.disabled = false;
          btn.innerText = "دخول";
        } else {
          window.location.href = "../index.html";
        }
      } else {
        const fullName = document.getElementById('full-name').value;
        if(!fullName) { 
          alert("الرجاء كتابة اسمك"); 
          btn.disabled = false; 
          btn.innerText = "تسجيل حساب جديد";
          return; 
        }
        
        const randomCode = Math.floor(1000 + Math.random() * 9000).toString();
        
        const { error } = await sb.auth.signUp({
          email, password,
          options: {
            data: { 
              display_name: fullName, 
              balance: "0.00", 
              customer_code: randomCode 
            }
          }
        });
        
        if (error) {
          alert("خطأ في التسجيل: " + error.message);
        } else {
          alert("تم التسجيل بنجاح! يمكنك الآن تسجيل الدخول.");
          toggleAuth();
        }
        btn.disabled = false;
        btn.innerText = "تسجيل حساب جديد";
      }
    }
  </script>
</body>
</html>
